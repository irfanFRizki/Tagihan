<%+header%>
<style>
#logbox{background:#0d1117;color:#58a6ff;font-family:'Courier New',monospace;font-size:12px;
padding:14px;border-radius:8px;min-height:300px;max-height:500px;overflow-y:auto;
white-space:pre-wrap;word-break:break-all;border:1px solid #30363d}
.log-ok{color:#3fb950}.log-err{color:#f85149}.log-warn{color:#d29922}
.log-info{color:#58a6ff}
.toolbar{margin-bottom:12px;display:flex;gap:8px;align-items:center}
.btn{padding:7px 16px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600}
.btn-blue{background:#1f6feb;color:#fff}.btn-blue:hover{background:#388bfd}
.btn-red{background:#da3633;color:#fff}.btn-red:hover{background:#f85149}
.btn-green{background:#238636;color:#fff}.btn-green:hover{background:#3fb950}
#status{font-size:12px;color:#8b949e;margin-left:8px}
</style>

<h2>📋 <%:Log Pengecekan Tagihan%></h2>

<div class="toolbar">
    <button class="btn btn-green" onclick="loadLog()">🔄 Refresh Log</button>
    <button class="btn btn-blue"  onclick="runCheck('all')">▶ Jalankan Cek Semua</button>
    <button class="btn btn-blue"  onclick="runCheck('pln')">⚡ Cek PLN</button>
    <button class="btn btn-blue"  onclick="runCheck('pdam')">💧 Cek PDAM</button>
    <button class="btn btn-blue"  onclick="runCheck('wifi')">📶 Cek WiFi</button>
    <button class="btn btn-red"   onclick="clearLog()">🗑 Clear</button>
    <span id="status"></span>
</div>

<div id="logbox">(klik Refresh Log atau Jalankan Cek untuk melihat output)</div>

<script>
var pollT;
function setStatus(t){document.getElementById('status').textContent=t;}

function colorize(text){
    return text
        .replace(/\[OK\]|\bOK\b|berhasil/gi,'<span class="log-ok">$&</span>')
        .replace(/ERROR|GAGAL|error|gagal|Exception|Traceback/gi,'<span class="log-err">$&</span>')
        .replace(/\[WARN\]|WARNING/gi,'<span class="log-warn">$&</span>')
        .replace(/\[PLN\]|\[PDAM\]|\[WiFi\]|\[TG\]/g,'<span class="log-info">$&</span>');
}

function loadLog(){
    setStatus('Memuat...');
    fetch('<%=luci.dispatcher.build_url("admin/services/tagihan/getlog")%>')
        .then(function(r){return r.text();})
        .then(function(t){
            var b=document.getElementById('logbox');
            b.innerHTML=colorize(t.replace(/</g,'&lt;').replace(/>/g,'&gt;'));
            b.scrollTop=b.scrollHeight;
            setStatus('✅ '+new Date().toLocaleTimeString('id-ID'));
        }).catch(function(e){setStatus('Error: '+e);});
}

function runCheck(target){
    setStatus('⏳ Menjalankan '+target+'...');
    clearInterval(pollT);
    fetch('<%=luci.dispatcher.build_url("admin/services/tagihan/refresh")%>?target='+target)
        .then(function(r){return r.json();})
        .then(function(){
            var n=0;
            pollT=setInterval(function(){
                n++;
                loadLog();
                if(n>=12){clearInterval(pollT);setStatus('✅ Selesai');}
            },3000);
        });
}

function clearLog(){
    document.getElementById('logbox').textContent='(log dikosongkan)';
    setStatus('');
}

// Auto load saat halaman dibuka
loadLog();
</script>
<%+footer%>
