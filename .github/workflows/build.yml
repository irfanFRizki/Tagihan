name: Build IPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version & Changelog
        id: info
        run: |
          VERSION=$(grep 'VERSION=' scripts/build-ipk.sh | head -1 \
                    | sed 's/.*:-//' | sed 's/}"//')
          DATE=$(date '+%Y-%m-%d')
          echo "VERSION=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "DATE=$DATE"         >> "$GITHUB_OUTPUT"
          echo "TAG=v${VERSION}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          {
            echo "CHANGELOG<<EOF_CHANGELOG_DELIMITER"
            git log --pretty=format:"- %s" -5
            echo ""
            echo "EOF_CHANGELOG_DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Show Source Tree
        run: |
          echo "=== Struktur packages/ ==="
          find packages/ -type f | sort
          echo ""

      - name: Build IPK
        run: |
          chmod +x scripts/build-ipk.sh
          bash scripts/build-ipk.sh ${{ steps.info.outputs.VERSION }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-v${{ steps.info.outputs.VERSION }}-build${{ github.run_number }}
          path: dist/*.ipk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.info.outputs.TAG }}
          name: "luci-app-tagihan v${{ steps.info.outputs.VERSION }} (${{ steps.info.outputs.DATE }})"
          files: dist/*.ipk
          body: |
            ## Tagihan Bot v${{ steps.info.outputs.VERSION }}
            **Build:** ${{ steps.info.outputs.DATE }} | #${{ github.run_number }}

            ### Fitur
            - Cek tagihan PDAM Jakarta (PAM Jaya) otomatis
            - Cek tagihan WiFi MyRepublic via email IMAP
            - Notifikasi Telegram terjadwal
            - Dashboard LuCI informatif

            ### Perubahan
            ${{ steps.info.outputs.CHANGELOG }}

            ### Cara Install
            ```sh
            opkg update
            opkg remove tagihan luci-app-tagihan 2>/dev/null
            opkg install tagihan_*.ipk --nodeps
            opkg install luci-app-tagihan_*.ipk --nodeps
            /etc/init.d/tagihan enable
            /etc/init.d/tagihan start
            ```
            Buka LuCI → **Services → Tagihan Bot**

            ### Info Build
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
